name: Update my_icons.json

on:
  push:
    paths:
      - "icons/**"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate my_icons.json
        run: |
          python3 << 'EOF'
          import json
          import os

          REPO = "Shamana-cn/My-Loon-Icons"

          icons = []

          for filename in sorted(os.listdir("icons")):
              if filename.lower().endswith(".png"):
                  name = os.path.splitext(filename)[0]
                  icons.append({
                      "name": name,
                      "url": f"https://raw.githubusercontent.com/{REPO}/main/icons/{filename}"
                  })

          data = {
              "name": "Shamana图标库",
              "description": "自定义图标",
              "icons": icons
          }

          with open("my_icons.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add my_icons.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update my_icons.json"
            git push
          fi
